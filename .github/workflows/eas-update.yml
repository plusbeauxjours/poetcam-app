name: 🚀 EAS Production Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🪏 Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_ACCESS_TOKEN }}

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🔐 Authenticate with Expo
        run: eas whoami

      - name: 📝 Log Build Message
        run: echo "🚀 EAS Build triggered from main branch - camera 기능 업데이트 포함"

      - name: 📦 Trigger EAS Build
        run: eas build --platform all --profile production --non-interactive --auto-submit
