name: 🚀 EAS Production Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v3

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 🚀 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🔐 Authenticate with Expo (via EXPO_TOKEN)
        run: eas whoami

      - name: 📝 Log Build Message
        run: echo "🚀 EAS Build triggered from main branch - camera 기능 업데이트 포함"

      - name: 📦 Trigger EAS Build
        run: eas build --platform all --profile production --non-interactive --auto-submit
